name: Validate Pull Request

# Basic checks on every pull request: typecheck, tests, and a web build. The
# version/release workflows only run on pushes to main, so this is the gate that
# catches regressions before a PR is merged.
#
# Also runs the `rust` job on pushes to main — NOT for PR gating, but to warm the
# Rust build cache on the default branch. GitHub only lets PR runs restore caches
# from the default branch, so without this every PR's rust job is a cold rebuild.
# (validate/changeset stay PR-only.)

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    # PR-only: on a main push the merged PR already validated; this job just
    # duplicates it. (The rust job below is the one that runs on main, to warm
    # the cache.)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      # pnpm version comes from package.json "packageManager".
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Lint (oxlint, type-aware — fails on correctness errors)
        run: pnpm lint
      - name: Typecheck
        run: pnpm -r typecheck
      - name: Test
        # Effectively `pnpm -r test`, but per package with its name written to
        # the step summary first — Vitest's built-in CI summary ("Vitest Test
        # Report") doesn't say which package it belongs to, so the three
        # reports were indistinguishable. Globs keep the same topological
        # order (packages/* before apps/*) and pick up future packages.
        shell: bash
        run: |
          for dir in packages/* apps/*; do
            if node -e "process.exit(require('./$dir/package.json').scripts?.test ? 0 : 1)"; then
              name=$(node -p "require('./$dir/package.json').name")
              echo "# \`$name\`" >> "$GITHUB_STEP_SUMMARY"
              pnpm --filter "$name" test
            fi
          done
      - name: Build web
        run: pnpm --filter @dth/web build

  # The browser smoke suite: the real SPA against the in-memory fake of the
  # native layer (apps/web/smoke). Catches the integration regressions the unit
  # tests can't see — loader wiring, editor save flow, artifact generation.
  smoke:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Cache the ~130 MB Chromium download, keyed on the installed Playwright
      # version — uncached it re-downloads on every PR run (minutes + a
      # download-flake surface). `--with-deps` below still apt-installs the
      # system libraries; only the browser binaries live in this cache.
      - name: Playwright version (cache key)
        id: pw
        shell: bash
        run: echo "version=$(node -p "require('./apps/web/node_modules/@playwright/test/package.json').version")" >> "$GITHUB_OUTPUT"
      - name: Cache Playwright browsers
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw.outputs.version }}
      - name: Install Playwright Chromium
        run: pnpm --filter @dth/web exec playwright install chromium --with-deps
      - name: Browser smoke (Playwright)
        run: pnpm --filter @dth/web smoke

  # Every feature PR must ship a changeset (the four packages — web, desktop,
  # rom, ui — are a fixed group, so this is what actually bumps the product
  # version and triggers a release).
  # A PR that legitimately needs no version bump (CI/docs-only) can satisfy this
  # with an empty changeset: `pnpm changeset --empty`. The version PR and
  # Dependabot are exempt (Dependabot can't author changesets — its bumps ride
  # the next release train; add a changeset manually to release one alone).
  changeset:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'pull_request' && github.head_ref != 'changeset-release/main' && github.actor != 'dependabot[bot]'
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Require a changeset
        run: pnpm changeset status --since=origin/${{ github.base_ref }}

  # The Rust backend wasn't built/tested on PRs — a broken crate (or a reverted
  # alloc pin) only surfaced at release time on main. This job catches both.
  rust:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          components: clippy
      # Cache the crate + registry so clippy/test don't rebuild from scratch every
      # PR (this job was ~5.5 min uncached). Keyed on Cargo.lock automatically.
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: apps/desktop
          # A fixed shared-key (instead of the default per-job key) so the cache
          # the main-push run saves is the same one PR runs restore — otherwise
          # the keys differ and PRs never hit it.
          shared-key: dth-desktop
      - name: Verify the brotli alloc pins are intact
        shell: bash
        working-directory: apps/desktop
        run: |
          # These exact versions keep brotli 8 working with Tauri (see Cargo.toml).
          # A stray `cargo update` or new dep can silently revert them.
          grep -A1 'name = "alloc-no-stdlib"' Cargo.lock | grep -q 'version = "2.0.4"' \
            || { echo "::error::alloc-no-stdlib is not pinned to 2.0.4 (breaks brotli 8) — re-pin per docs/devops.md"; exit 1; }
          grep -A1 'name = "alloc-stdlib"' Cargo.lock | grep -q 'version = "0.2.2"' \
            || { echo "::error::alloc-stdlib is not pinned to 0.2.2 — re-pin per docs/devops.md"; exit 1; }
      - name: cargo clippy (locked, deny warnings)
        working-directory: apps/desktop
        run: cargo clippy --locked --all-targets -- -D warnings
      - name: cargo test (locked)
        working-directory: apps/desktop
        run: cargo test --locked
