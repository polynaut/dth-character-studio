# Real preview deployments for the Pages site: every PR touching the site or
# the guide gets its own Cloudflare Pages preview URL — GitHub Pages itself has
# no PR previews. PRODUCTION hosting stays on GitHub Pages (pages.yml);
# Cloudflare only serves previews, deployed as a plain static upload from this
# runner (no Cloudflare build, no third-party action — wrangler is just the
# uploader).
#
# One-time setup (repo secrets; until they exist the job soft-skips green):
#   CLOUDFLARE_ACCOUNT_ID — dash.cloudflare.com → account home → "Account ID"
#   CLOUDFLARE_API_TOKEN  — API token with permission "Account → Cloudflare
#                           Pages → Edit" (nothing else)
# The Pages project ($PROJECT) is created automatically on the first run.
# Fork PRs: secrets aren't exposed to them, so the job skips (same-repo guard).

name: 🔍 Pull Request Pages preview

# Previews deploy ONLY for PRs that change what the published page actually
# serves — the same content inputs pages.yml deploys to production (keep the
# two lists in sync): the landing page (site/**), the guide source rendered
# into it (docs/guide/**, incl. regenerated screenshots), and the guide build
# script. The one non-content exception is this workflow file itself — a PR
# changing the preview pipeline must prove it still deploys.
on:
  pull_request:
    # `closed` fires on merge AND plain close — that's the cleanup trigger;
    # the other types redeploy the preview.
    types: [opened, synchronize, reopened, closed]
    paths:
      - 'site/**'
      - 'docs/guide/**'
      - 'scripts/build-guide-site.mjs'
      - '.github/workflows/site-preview.yml'
  # Manual cleanup for a PR whose previews predate the cleanup job (or if a
  # closed-event run was missed): pass the PR number.
  workflow_dispatch:
    inputs:
      cleanup_pr:
        description: 'PR number whose preview deployments to delete'
        required: true
        type: number

permissions:
  contents: read
  pull-requests: write
  deployments: write

concurrency:
  group: site-preview-${{ github.ref }}
  cancel-in-progress: true

env:
  PROJECT: dth-character-studio

jobs:
  preview:
    if: >-
      github.event_name == 'pull_request' &&
      github.event.action != 'closed' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build the guide into the site
        run: pnpm build:guide
      - name: Deploy preview to Cloudflare Pages
        id: deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          if [ -z "${CLOUDFLARE_API_TOKEN:-}" ] || [ -z "${CLOUDFLARE_ACCOUNT_ID:-}" ]; then
            echo "::notice::Site preview skipped — CLOUDFLARE_API_TOKEN / CLOUDFLARE_ACCOUNT_ID secrets not set (see this workflow's header)."
            echo "skipped=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # First run only: create the project (tolerated failure once it exists).
          pnpm dlx wrangler@4 pages project create "$PROJECT" --production-branch main 2>/dev/null || true
          branch="pr-${{ github.event.pull_request.number }}"
          out=$(pnpm dlx wrangler@4 pages deploy site \
            --project-name "$PROJECT" \
            --branch "$branch" \
            --commit-hash "${{ github.event.pull_request.head.sha }}" | tee /dev/stderr)
          url=$(grep -oE 'https://[a-z0-9.-]+\.pages\.dev' <<<"$out" | head -1)
          echo "url=$url" >> "$GITHUB_OUTPUT"
          echo "alias=https://${branch}.${PROJECT}.pages.dev" >> "$GITHUB_OUTPUT"
      # Surface the preview as a GitHub deployment so the PR shows a native
      # "deployed — View deployment" box linking straight to the preview URL.
      - name: Register the preview as a GitHub deployment
        if: steps.deploy.outputs.skipped != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          env_name="site-preview-pr-${{ github.event.pull_request.number }}"
          dep=$(jq -n \
            --arg ref "${{ github.event.pull_request.head.sha }}" \
            --arg env "$env_name" \
            '{ref:$ref, environment:$env, auto_merge:false, required_contexts:[],
              transient_environment:true, description:"Cloudflare Pages preview"}' |
            gh api -X POST "repos/${{ github.repository }}/deployments" --input - -q .id)
          jq -n \
            --arg url "${{ steps.deploy.outputs.alias }}" \
            '{state:"success", environment_url:$url, auto_inactive:true,
              description:"Preview live on Cloudflare Pages"}' |
            gh api -X POST "repos/${{ github.repository }}/deployments/$dep/statuses" --input - >/dev/null

      - name: Sticky PR comment with the preview URL
        if: steps.deploy.outputs.skipped != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          marker="<!-- site-preview -->"
          body="$marker
          ### 🔍 Site preview deployed

          | | |
          |---|---|
          | **Preview (this PR)** | ${{ steps.deploy.outputs.alias }} |
          | Guide | ${{ steps.deploy.outputs.alias }}/guide/ |
          | Exactly this commit | ${{ steps.deploy.outputs.url }} |

          Redeploys on every push to this PR. Production stays on GitHub Pages."
          num=${{ github.event.pull_request.number }}
          existing=$(gh api "repos/${{ github.repository }}/issues/$num/comments" --paginate \
            -q ".[] | select(.body | startswith(\"$marker\")) | .id" | head -1)
          if [ -n "$existing" ]; then
            gh api -X PATCH "repos/${{ github.repository }}/issues/comments/$existing" -f body="$body" >/dev/null
          else
            gh api -X POST "repos/${{ github.repository }}/issues/$num/comments" -f body="$body" >/dev/null
          fi

  # The other end of the lifecycle: when a previewed PR merges or closes, its
  # Cloudflare deployments (per-commit URLs + the pr-N alias) and its GitHub
  # environment are deleted — previews never accumulate.
  cleanup:
    if: >-
      (github.event_name == 'pull_request' && github.event.action == 'closed') ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Delete the PR's preview deployments + environment
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          pr="${{ github.event.pull_request.number || inputs.cleanup_pr }}"
          branch="pr-${pr}"
          env_name="site-preview-pr-${pr}"
          # --- Cloudflare: delete every deployment of the PR's branch --------
          if [ -n "${CLOUDFLARE_API_TOKEN:-}" ] && [ -n "${CLOUDFLARE_ACCOUNT_ID:-}" ]; then
            base="https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects/${PROJECT}"
            for page in 1 2 3 4 5; do
              ids=$(curl -sS -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
                "${base}/deployments?per_page=25&page=${page}" |
                jq -r --arg b "$branch" '.result[]? | select(.deployment_trigger.metadata.branch == $b) | .id')
              [ -z "$ids" ] && break
              for id in $ids; do
                echo "deleting Cloudflare deployment $id ($branch)"
                curl -sS -X DELETE -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
                  "${base}/deployments/${id}?force=true" >/dev/null
              done
            done
          else
            echo "::notice::Cloudflare secrets not set — skipped the Cloudflare half."
          fi
          # --- GitHub: deactivate + delete the deployments, drop the env -----
          for id in $(gh api "repos/${{ github.repository }}/deployments?environment=${env_name}&per_page=100" -q '.[].id'); do
            echo "removing GitHub deployment $id (${env_name})"
            gh api -X POST "repos/${{ github.repository }}/deployments/${id}/statuses" \
              -f state=inactive >/dev/null 2>&1 || true
            gh api -X DELETE "repos/${{ github.repository }}/deployments/${id}" >/dev/null 2>&1 || true
          done
          gh api -X DELETE "repos/${{ github.repository }}/environments/${env_name}" >/dev/null 2>&1 || true
          echo "cleanup done for PR #${pr}"
