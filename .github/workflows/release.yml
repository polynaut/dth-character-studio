name: 🚀 Release

# On every push to main: release only when there are no pending changesets (i.e.
# the "version packages" PR has just merged, bumping apps/desktop/package.json)
# AND that version has no tag yet. Feature merges (which still carry changesets)
# are skipped — they only feed the version packages PR.
#
# Stages (see docs/devops.md → "Code signing"):
#   check      gate + release notes
#   build-win  hosted Windows runner — builds the NSIS installer (unsigned)
#   build-mac  hosted macOS runner (opt-in via ENABLE_MAC_RELEASE) — builds the
#              UNSIGNED arm64 .app + .dmg; throwaway updater key here too
#              (same rule as Windows: hosted build jobs see no real secrets)
#   sign-win   self-hosted Certum signer (the NAS runner beside the always-on
#              certum-container/SimplySign session) — Authenticode-signs the
#              installer through the shared p11-kit socket and regenerates the
#              Windows updater .sig over the SIGNED bytes with the real key.
#   sign-mac   hosted macOS runner behind the SAME release-signing gate —
#              Developer-ID-signs the .app, notarizes + staples app and dmg,
#              and regenerates the macOS updater .sig with the real key.
#              sign-win and sign-mac run in PARALLEL; each needs its own
#              manual approval on the release-signing environment.
#   publish    hosted runner — downloads the signed artifacts, builds ONE
#              latest.json across every platform, and creates the GitHub Release.
#
# Why sign and publish are separate jobs: the NAS is the single point of failure
# in this pipeline (it holds the SimplySign session), so the NAS job is kept as
# small as possible — ONLY the operations that need the real key/cert. The
# GitHub publish (which needs no signing secret, just GITHUB_TOKEN) runs on a
# reliable hosted runner, so a publish hiccup can be re-run without re-signing,
# and the real updater key never has to leave the self-hosted signer.
#
# Order matters: the updater signature and latest.json must be computed AFTER
# Authenticode signing, because signing changes the installer bytes.
#
# macOS is OPT-IN: set repo variable ENABLE_MAC_RELEASE=true once the Apple
# secrets are in place (a Developer ID cert + an App Store Connect API key — the
# same set already used elsewhere works, one Developer ID covers every app under
# the team). Until then the mac build is skipped and Windows releases normally.
# Required secrets for the mac side (used only by the gated sign-mac job):
#   APPLE_CERTIFICATE            base64 of the Developer ID Application .p12
#   APPLE_CERTIFICATE_PASSWORD   the .p12 export password
#   APPLE_SIGNING_IDENTITY       e.g. "Developer ID Application: Name (TEAMID)"
#   APPLE_API_ISSUER             App Store Connect API issuer UUID
#   APPLE_API_KEY                App Store Connect API key ID
#   APPLE_API_KEY_P8             the AuthKey_*.p8 contents (for notarytool)

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency: release-${{ github.ref }}

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      version: ${{ steps.v.outputs.version }}
      should_release: ${{ steps.v.outputs.should_release }}
      notes: ${{ steps.notes.outputs.body }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
      - id: v
        shell: bash
        run: |
          version=$(node -p "require('./apps/desktop/package.json').version")
          echo "version=$version" >> "$GITHUB_OUTPUT"
          # Pending changesets mean a "version packages" PR is still open — the
          # version hasn't been bumped yet, so don't release. Only release once
          # that PR merges (which consumes the changesets + bumps the version).
          # `grep || true` so a no-match (only README.md left) doesn't trip the
          # step's `set -e -o pipefail` — that is exactly the "release now" case.
          pending=$(ls .changeset/*.md 2>/dev/null | { grep -vi 'README.md' || true; } | wc -l)
          if [ "$pending" -gt 0 ]; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "$pending pending changeset(s) — waiting for the version packages PR to merge."
          elif git rev-parse "v$version" >/dev/null 2>&1; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "Tag v$version already exists — nothing to release."
          else
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "Releasing v$version."
          fi
      # Build the release body from the Changesets CHANGELOGs (the actual
      # changes), rather than the "version packages" commit subject. Computed
      # here so the signer job needs no checkout.
      - id: notes
        if: steps.v.outputs.should_release == 'true'
        shell: bash
        run: |
          {
            echo "body<<RELEASE_NOTES_EOF"
            node scripts/release-notes.mjs "${{ steps.v.outputs.version }}"
            echo "RELEASE_NOTES_EOF"
          } >> "$GITHUB_OUTPUT"

  build-win:
    needs: check
    if: needs.check.outputs.should_release == 'true'
    runs-on: windows-latest
    timeout-minutes: 60
    # Deliberately NO Rust cache here (unlike the PR `rust` job): the release
    # installer is built from a cold, fully reproducible compile — a poisoned or
    # stale cache must not be able to influence the bytes we sign and ship.
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      # pnpm version comes from package.json "packageManager".
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: pnpm
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      # Cache Cargo's downloaded SOURCE only (registry index + .crate tarballs +
      # git deps) — NOT target/ compiled artifacts. Cargo verifies every crate
      # against Cargo.lock's checksums, so even a poisoned cache can't inject
      # tampered code: the signed build stays a cold compile of pinned source.
      # Saves the crate-download time without touching the "cold + reproducible"
      # guarantee (safe even with outside contributors).
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: cargo-src-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-src-${{ runner.os }}-
      - run: pnpm install --frozen-lockfile
      # The build-time updater .sig is DISCARDED — the signer regenerates it over
      # the Authenticode-signed bytes with the real key. So the real updater key
      # (which every installed app trusts) never needs to enter this hosted-runner
      # job that runs third-party actions: generate a throwaway keypair just to
      # satisfy createUpdaterArtifacts. The real TAURI_SIGNING_PRIVATE_KEY lives
      # only on the self-hosted signer job below.
      - name: Generate a throwaway updater key (real key stays on the signer)
        shell: bash
        run: |
          set -euo pipefail
          npx --yes @tauri-apps/cli@2.11.2 signer generate --ci --password "" -f -w throwaway.key
          # printf'ing the command substitution guarantees exactly one trailing
          # newline — the generated key file has NONE, and without it the heredoc
          # delimiter lands on the key's own line and GitHub's env parser fails
          # ("Matching delimiter not found").
          {
            echo "TAURI_SIGNING_PRIVATE_KEY<<THROWAWAY_KEY_EOF"
            printf '%s\n' "$(cat throwaway.key)"
            echo "THROWAWAY_KEY_EOF"
            echo "TAURI_SIGNING_PRIVATE_KEY_PASSWORD="
          } >> "$GITHUB_ENV"
      # Build only — no tagName/release inputs, so tauri-action publishes nothing.
      # Pinned to a full commit SHA: this third-party action builds the installer
      # we then Authenticode-sign + ship, so a moved tag must not be able to change
      # its output silently. (Bump the SHA by hand when updating tauri-action.)
      - uses: tauri-apps/tauri-action@1deb371b0cd8bd54025b384f1cd735e725c4060f # v1.0.0
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ env.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ env.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/desktop
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: unsigned-installer
          path: apps/desktop/target/release/bundle/nsis/*-setup.exe
          if-no-files-found: error
          retention-days: 3

  build-mac:
    needs: check
    # Opt-in: set repo variable ENABLE_MAC_RELEASE=true once the Apple secrets
    # (see the header) are in place. Until then this job is skipped and Windows
    # releases normally (the publish job tolerates a skipped mac side).
    if: needs.check.outputs.should_release == 'true' && vars.ENABLE_MAC_RELEASE == 'true'
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: pnpm
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          targets: aarch64-apple-darwin
      # Source-only Cargo cache (see build-win) — index + .crate tarballs + git
      # deps, never target/. Cargo checksums each crate against Cargo.lock.
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: cargo-src-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-src-${{ runner.os }}-
      - run: pnpm install --frozen-lockfile
      # As on Windows: the REAL updater key never touches this hosted runner (it
      # runs the third-party tauri-action). Sign the updater artifact with a
      # throwaway key here; the Certum job regenerates the real .sig over the
      # notarized bytes.
      - name: Generate a throwaway updater key (real key stays on the signer)
        shell: bash
        run: |
          set -euo pipefail
          npx --yes @tauri-apps/cli@2.11.2 signer generate --ci --password "" -f -w throwaway.key
          {
            echo "TAURI_SIGNING_PRIVATE_KEY<<THROWAWAY_KEY_EOF"
            printf '%s\n' "$(cat throwaway.key)"
            echo "THROWAWAY_KEY_EOF"
            echo "TAURI_SIGNING_PRIVATE_KEY_PASSWORD="
          } >> "$GITHUB_ENV"
      # Apple Silicon (arm64) UNSIGNED build — like build-win, this hosted job
      # that runs the third-party tauri-action sees NO real signing material.
      # Developer-ID signing + notarization happen in sign-mac, behind the
      # release-signing approval gate. `--bundles app,dmg` overrides the
      # config's nsis-only target for macOS. (arm64-only, not universal: it
      # halves the build; Intel Macs are unsupported. Switch back to
      # `universal-apple-darwin` + re-add darwin-x86_64 below to restore.)
      - uses: tauri-apps/tauri-action@1deb371b0cd8bd54025b384f1cd735e725c4060f # v1.0.0
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ env.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ env.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/desktop
          args: --target aarch64-apple-darwin --bundles app,dmg
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: unsigned-mac
          path: |
            apps/desktop/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
            apps/desktop/target/aarch64-apple-darwin/release/bundle/macos/*.app.tar.gz
          if-no-files-found: error
          retention-days: 3

  sign-win:
    needs: [check, build-win]
    runs-on: [self-hosted, linux, certum-signer]
    # Keep a hung sign step from holding the SINGLE NAS runner for the 360-min
    # GitHub default — every later release would queue behind it.
    timeout-minutes: 30
    # Protected environment (required reviewer): every release PAUSES here for
    # manual approval before anything touches the SimplySign session.
    environment: release-signing
    env:
      VERSION: ${{ needs.check.outputs.version }}
      SOCK: ${{ vars.CERTUM_P11_SOCKET || '/run/p11-kit/p11kit.sock' }}
    steps:
      # The self-hosted runner reuses its workspace — without this, the previous
      # release's installer is still in dist/ and the exe globs match two files.
      - name: Clean workspace
        shell: bash
        run: rm -rf dist dist-mac latest.json

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: unsigned-installer
          path: dist

      - name: Authenticode-sign via Certum SimplySign
        shell: bash
        run: |
          set -euo pipefail
          # Version-strict: exactly this release's installer, nothing else.
          matches=(dist/*_"${VERSION}"_*-setup.exe)
          if [ ${#matches[@]} -ne 1 ] || [ ! -f "${matches[0]}" ]; then
            echo "::error::expected exactly one v${VERSION} installer in dist/ — found: ${matches[*]}"
            exit 1
          fi
          exe="${matches[0]}"
          [ -S "$SOCK" ] || {
            echo "::error::p11-kit socket missing at $SOCK — is certum-container running with its keepalive robot? See docs/devops.md → Code signing."
            exit 1
          }
          export P11_KIT_SERVER_ADDRESS="unix:path=$SOCK"
          # The runner's sign-installer.sh signs + timestamps (time.certum.pl)
          # + embeds the Certum intermediate for a self-contained chain. No PIN:
          # the SimplySign virtual card takes an empty PIN — the automated
          # SimplySign login (NAS keepalive robot) is the auth. Its own final verify is informational (offline anchoring
          # on Certum's cross-signed roots is fussy) — a produced file is a
          # valid signature.
          orig=$(stat -c%s "$exe")
          if ! sign-installer.sh "$exe" "$exe.signed" \
            "DTH Character Studio" "https://github.com/polynaut/dth-character-studio"; then
            echo "::error::signing failed — if the log says 'Failed to enumerate slots', the SimplySign session has lapsed — check the NAS keepalive robot (it should refresh the session before the ~2 h expiry), then re-run this job."
            exit 1
          fi
          # The signed file must be non-empty AND larger than the unsigned input:
          # an Authenticode signature adds bytes, so if it didn't grow, signing
          # silently no-op'd. A cheap early guard on top of the presence gate below.
          if [ ! -s "$exe.signed" ] || [ "$(stat -c%s "$exe.signed")" -le "$orig" ]; then
            echo "::error::signed installer is not larger than the unsigned input — no signature was embedded"
            exit 1
          fi
          mv "$exe.signed" "$exe"
          # Presence gate (validated in sign-smoketest.yml on the same runner /
          # osslsigncode 2.13): refuse to publish a silently-unsigned installer.
          # Parses the signature COUNT from verify's output — verify's EXIT code
          # is unreliable here (offline chain anchoring on Certum's cross-signed
          # roots is fussy, hence the informational verify below), so we ignore
          # it. `|| true` keeps the count pipeline's non-zero from tripping this
          # step's `set -e`; an unsigned PE yields an empty count → 0 → fail.
          sig_n="$(osslsigncode verify -in "$exe" 2>&1 \
            | grep -oiE 'Number of (verified )?signatures *:? *[0-9]+' \
            | grep -oE '[0-9]+' | head -1 || true)"
          if [ "${sig_n:-0}" -ge 1 ] 2>/dev/null; then
            echo "Authenticode signature present (count=$sig_n) ✓"
          else
            echo "::error::signed installer carries NO Authenticode signature — refusing to publish"
            exit 1
          fi
          osslsigncode verify -CAfile /etc/ssl/certs/ca-certificates.crt \
            -TSA-CAfile /etc/ssl/certs/ca-certificates.crt \
            -in "$exe" || true

      # The updater verifies the minisign signature over the exact bytes it
      # downloads — regenerate the .sig now that the installer is signed. This
      # stays on the signer (not the hosted publish job) so the real updater key
      # never leaves the self-hosted runner.
      - name: Regenerate updater signature (over the signed installer)
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          exe=$(ls dist/*_"${VERSION}"_*-setup.exe)
          # Pin the CLI to the exact lockfile version — a floating `@^2` would pull
          # unpinned code from npm at release time WITH the real updater key in env.
          npx --yes @tauri-apps/cli@2.11.2 signer sign \
            --private-key "$TAURI_SIGNING_PRIVATE_KEY" \
            --password "${TAURI_SIGNING_PRIVATE_KEY_PASSWORD:-}" \
            "$exe"
          test -s "$exe.sig"

      # Hand the SIGNED installer + its .sig to the hosted publish job. The
      # artifact round-trip is byte-exact, so the updater .sig still verifies.
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: signed-release
          path: |
            dist/*_${{ needs.check.outputs.version }}_*-setup.exe
            dist/*_${{ needs.check.outputs.version }}_*-setup.exe.sig
          if-no-files-found: error
          retention-days: 3

  # The macOS half of the signing stage — parallel to sign-win, behind the SAME
  # release-signing approval gate (each job pauses for its own approval). Runs
  # on a hosted macOS runner because codesign/notarytool are macOS-only; the
  # Apple Developer-ID certificate and the real updater key are only touched
  # here, never in the unsigned build job.
  sign-mac:
    needs: [check, build-mac]
    runs-on: macos-latest
    # Notarization is Apple-paced (usually minutes, occasionally more).
    timeout-minutes: 45
    environment: release-signing
    env:
      VERSION: ${{ needs.check.outputs.version }}
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: unsigned-mac
          path: dist-mac

      - name: Import the Developer ID certificate into a throwaway keychain
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN="$RUNNER_TEMP/sign.keychain-db"
          KEYCHAIN_PW="$(openssl rand -hex 24)"
          security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security set-keychain-settings -lut 2700 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          printf '%s' "$APPLE_CERTIFICATE" | base64 -d > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" \
            -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          rm -f "$RUNNER_TEMP/cert.p12"
          security set-key-partition-list -S apple-tool:,apple: -s \
            -k "$KEYCHAIN_PW" "$KEYCHAIN" >/dev/null
          security list-keychains -d user -s "$KEYCHAIN" login.keychain-db

      - name: Write notarization API key
        shell: bash
        run: |
          set -euo pipefail
          printf '%s' "${{ secrets.APPLE_API_KEY_P8 }}" > "$RUNNER_TEMP/api_key.p8"
          echo "APPLE_API_KEY_PATH=$RUNNER_TEMP/api_key.p8" >> "$GITHUB_ENV"

      # Sign the .app, notarize + staple it, rebuild the updater tarball over
      # the stapled bundle, then rebuild/sign/notarize/staple the dmg from the
      # same signed app — filenames stay exactly as the build produced them.
      - name: Developer-ID sign, notarize & staple (app tarball + dmg)
        shell: bash
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
        run: |
          set -euo pipefail
          notarize() {
            xcrun notarytool submit "$1" \
              --key "$APPLE_API_KEY_PATH" --key-id "$APPLE_API_KEY" \
              --issuer "$APPLE_API_ISSUER" --wait
          }
          tarball=$(find dist-mac -name '*.app.tar.gz' | head -1)
          dmg=$(find dist-mac -name '*.dmg' | head -1)
          [ -n "$tarball" ] && [ -n "$dmg" ] || { echo "::error::unsigned mac bundle incomplete"; exit 1; }
          work="$RUNNER_TEMP/app-work"; mkdir -p "$work"
          tar -xzf "$tarball" -C "$work"
          app=$(find "$work" -maxdepth 1 -name '*.app' | head -1)
          codesign --force --deep --options runtime --timestamp \
            --sign "$APPLE_SIGNING_IDENTITY" "$app"
          ditto -c -k --keepParent "$app" "$RUNNER_TEMP/app.zip"
          notarize "$RUNNER_TEMP/app.zip"
          xcrun stapler staple "$app"
          codesign --verify --deep --strict "$app"
          # The updater downloads this tarball — rebuild it over the stapled app
          # (COPYFILE_DISABLE keeps AppleDouble ._ files out of the archive).
          rm -f "$tarball"
          COPYFILE_DISABLE=1 tar -czf "$tarball" -C "$work" "$(basename "$app")"
          # Fresh-install dmg from the same signed app, same filename as built.
          rm -f "$dmg"
          hdiutil create -volname "DTH Character Studio" -srcfolder "$app" \
            -ov -format UDZO "$dmg"
          codesign --force --timestamp --sign "$APPLE_SIGNING_IDENTITY" "$dmg"
          notarize "$dmg"
          xcrun stapler staple "$dmg"

      # The updater verifies the minisign signature over the exact bytes it
      # downloads — sign the rebuilt (stapled) tarball with the real key. The
      # .dmg (fresh-install download) needs no updater .sig.
      - name: Regenerate macOS updater signature (over the stapled tarball)
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          tar=$(find dist-mac -name '*.app.tar.gz' | head -1)
          # Pin the CLI to the exact lockfile version — a floating `@^2` would pull
          # unpinned code from npm at release time WITH the real updater key in env.
          npx --yes @tauri-apps/cli@2.11.2 signer sign \
            --private-key "$TAURI_SIGNING_PRIVATE_KEY" \
            --password "${TAURI_SIGNING_PRIVATE_KEY_PASSWORD:-}" \
            "$tar"
          test -s "$tar.sig"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: signed-mac
          path: |
            dist-mac/**/*.dmg
            dist-mac/**/*.app.tar.gz
            dist-mac/**/*.app.tar.gz.sig
          if-no-files-found: error
          retention-days: 3

  publish:
    needs: [check, sign-win, sign-mac]
    # Windows must be signed; the mac side is either signed too or the whole
    # mac half was skipped (ENABLE_MAC_RELEASE off). A FAILED sign-mac blocks
    # the release instead of silently shipping Windows-only.
    if: >-
      always() && needs.check.outputs.should_release == 'true'
      && needs.sign-win.result == 'success'
      && (needs.sign-mac.result == 'success' || needs.sign-mac.result == 'skipped')
    # Publishing needs no signing secret — only GITHUB_TOKEN — so it runs on a
    # reliable hosted runner. Keeping it off the NAS means a GitHub API hiccup
    # can be re-run without re-signing, and shrinks the NAS's job to signing only.
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      VERSION: ${{ needs.check.outputs.version }}
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: signed-release
          path: dist

      # Optional — only exists when the mac build ran. continue-on-error so a
      # Windows-only release (flag off) publishes normally.
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        continue-on-error: true
        with:
          name: signed-mac
          path: dist-mac

      - name: Publish release (installer + dmg + sigs + latest.json)
        shell: bash
        env:
          # The default GITHUB_TOKEN (github-actions[bot]) is blocked from
          # creating releases on this repo — POST /releases returns 403
          # "Resource not accessible by integration" even though the job is
          # granted contents:write (verified in the job's own permission log).
          # A PAT is not subject to that integration restriction, so the release
          # step runs under RELEASE_PAT (fine-grained, Contents: read+write).
          # Falls back to the bot token if the secret is unset.
          GH_TOKEN: ${{ secrets.RELEASE_PAT || secrets.GITHUB_TOKEN }}
          NOTES: ${{ needs.check.outputs.notes }}
        run: |
          set -euo pipefail
          exe=$(ls dist/*_"${VERSION}"_*-setup.exe)
          # GitHub rewrites spaces in asset names to dots — latest.json must
          # point at the rewritten name (same convention tauri-action used).
          win_asset=$(basename "$exe" | tr ' ' '.')
          export WIN_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/v${VERSION}/${win_asset}"
          assets=("$exe" "$exe.sig")

          # macOS artifacts are optional — present only when the mac build ran.
          # upload-artifact preserves the bundle/ subdirs, so they land nested —
          # find them rather than globbing flat.
          export MAC_TAR=""
          if [ -d dist-mac ]; then
            MAC_TAR=$(find dist-mac -name '*.app.tar.gz' | head -1)
          fi
          if [ -n "$MAC_TAR" ]; then
            mac_dmg=$(find dist-mac -name '*.dmg' | head -1)
            mac_tar_asset=$(basename "$MAC_TAR" | tr ' ' '.')
            export MAC_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/v${VERSION}/${mac_tar_asset}"
            assets+=("$MAC_TAR" "$MAC_TAR.sig" "$mac_dmg")
          fi

          # ONE latest.json for every platform. The macOS build is Apple Silicon
          # (arm64) only, so the mac tarball is listed under darwin-aarch64.
          node -e '
            const fs = require("fs");
            const winSig = fs.readFileSync(process.argv[1] + ".sig", "utf8").trim();
            const winEntry = { signature: winSig, url: process.env.WIN_URL };
            const platforms = {
              "windows-x86_64": winEntry,
              "windows-x86_64-nsis": winEntry,
            };
            if (process.env.MAC_TAR) {
              const macSig = fs
                .readFileSync(process.env.MAC_TAR + ".sig", "utf8")
                .trim();
              const macEntry = { signature: macSig, url: process.env.MAC_URL };
              platforms["darwin-aarch64"] = macEntry;
            }
            fs.writeFileSync("latest.json", JSON.stringify({
              version: process.env.VERSION,
              notes: process.env.NOTES,
              pub_date: new Date().toISOString(),
              platforms,
            }, null, 2));
          ' "$exe"
          gh release create "v${VERSION}" \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "DTH Character Studio v${VERSION}" \
            --notes "$NOTES" \
            --latest \
            "${assets[@]}" latest.json
