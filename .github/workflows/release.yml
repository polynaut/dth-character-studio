name: Release

# On every push to main: release only when there are no pending changesets (i.e.
# the "version packages" PR has just merged, bumping apps/desktop/package.json)
# AND that version has no tag yet. Then build the Tauri app and publish a GitHub
# Release with the installer + the updater's latest.json. Feature merges (which
# still carry changesets) are skipped — they only feed the version packages PR.

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency: release-${{ github.ref }}

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
      should_release: ${{ steps.v.outputs.should_release }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - id: v
        shell: bash
        run: |
          version=$(node -p "require('./apps/desktop/package.json').version")
          echo "version=$version" >> "$GITHUB_OUTPUT"
          # Pending changesets mean a "version packages" PR is still open — the
          # version hasn't been bumped yet, so don't release. Only release once
          # that PR merges (which consumes the changesets + bumps the version).
          # `grep || true` so a no-match (only README.md left) doesn't trip the
          # step's `set -e -o pipefail` — that is exactly the "release now" case.
          pending=$(ls .changeset/*.md 2>/dev/null | { grep -vi 'README.md' || true; } | wc -l)
          if [ "$pending" -gt 0 ]; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "$pending pending changeset(s) — waiting for the version packages PR to merge."
          elif git rev-parse "v$version" >/dev/null 2>&1; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "Tag v$version already exists — nothing to release."
          else
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "Releasing v$version."
          fi

  release:
    needs: check
    if: needs.check.outputs.should_release == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v5
        with:
          version: 9
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
      - run: pnpm install --frozen-lockfile
      # Build the release body from the Changesets CHANGELOGs (the actual changes),
      # rather than letting it fall back to the "version packages" commit subject.
      - id: notes
        shell: bash
        run: |
          {
            echo "body<<RELEASE_NOTES_EOF"
            node scripts/release-notes.mjs "${{ needs.check.outputs.version }}"
            echo "RELEASE_NOTES_EOF"
          } >> "$GITHUB_OUTPUT"
      # --- Authenticode code signing via Azure Trusted/Artifact Signing ---
      # Gated on the AZURE_CLIENT_ID secret. If it's unset (Azure not configured
      # yet) the release still builds, just UNSIGNED — exactly as before. Once the
      # secrets/variables in docs/devops.md are in place, the installer + app .exe
      # are Authenticode-signed during the build, so the updater .sig is computed
      # over the signed binary (correct order). See docs/devops.md → "Code signing".
      - id: signing
        shell: bash
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
        run: |
          if [ -n "$AZURE_CLIENT_ID" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Azure signing not configured — publishing an UNSIGNED build (SmartScreen/Defender may flag it). See docs/devops.md."
          fi
      - name: Install Azure signer
        if: steps.signing.outputs.enabled == 'true'
        run: cargo install artifact-signing-cli --locked
      - name: Enable Authenticode signing
        if: steps.signing.outputs.enabled == 'true'
        shell: bash
        env:
          TS_ENDPOINT: ${{ vars.AZURE_ARTIFACT_SIGNING_ENDPOINT }}
          TS_ACCOUNT: ${{ vars.AZURE_ARTIFACT_SIGNING_ACCOUNT }}
          TS_PROFILE: ${{ vars.AZURE_ARTIFACT_SIGNING_CERTIFICATE_PROFILE }}
        run: |
          # Inject signCommand into the checked-out config in CI only (never
          # committed) so local/dev builds stay signing-free. Tauri replaces %1
          # with each artifact path. Description is a single token (Tauri splits
          # the command on whitespace), so no quotes/spaces here.
          cfg=apps/desktop/tauri.conf.json
          cmd="artifact-signing-cli -e $TS_ENDPOINT -a $TS_ACCOUNT -c $TS_PROFILE -d DTH_Character_Studio %1"
          tmp=$(mktemp)
          jq --arg cmd "$cmd" '.bundle.windows.signCommand = $cmd' "$cfg" > "$tmp" && mv "$tmp" "$cfg"
          echo "signCommand → $(jq -r '.bundle.windows.signCommand' "$cfg")"
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Updater artifact signing (generate with `pnpm --filter @dth/desktop tauri signer generate`)
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Azure Trusted/Artifact Signing — consumed by artifact-signing-cli via
          # the signCommand injected above. Empty (no-op) until the secrets exist.
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
        with:
          projectPath: apps/desktop
          tagName: v${{ needs.check.outputs.version }}
          releaseName: DTH Character Studio v${{ needs.check.outputs.version }}
          releaseBody: ${{ steps.notes.outputs.body }}
          releaseDraft: false
          includeUpdaterJson: true
