# Deploys the landing page (site/) to GitHub Pages:
# https://polynaut.github.io/dth-character-studio/
#
# The landing page is plain static HTML/CSS/JS uploaded as-is. The guide
# (docs/guide/*.md — the single source of truth, also rendered by GitHub) is
# additionally built into site/guide/ at deploy time by
# scripts/build-guide-site.mjs, so it ships styled with the site. Runs when
# the site, the guide, or this pipeline changes on main.

name: 🌐 Pages deployment

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'docs/guide/**'
      - 'scripts/build-guide-site.mjs'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build the guide into the site (docs/guide → site/guide)
        run: pnpm build:guide
      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
