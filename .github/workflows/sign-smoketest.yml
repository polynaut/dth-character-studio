name: Signing smoke test

# Manual end-to-end probe of the Certum/SimplySign Authenticode path: signs a
# COPY of a previously released installer on the self-hosted signer runner and
# verifies the result. Publishes NOTHING — the signed file never leaves the
# runner and is deleted at the end. Run this after (re)starting certum-container
# and logging into SimplySign, before cutting the first signed release.
#
# The sign step is intentionally identical (same command, same vars/defaults)
# to the one in release.yml — a green run here means the release path signs.

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Existing release whose installer is used as the test binary"
        required: false
        default: "v0.26.1"
      socket:
        description: "p11-kit socket path override (defaults to the CERTUM_P11_SOCKET repo variable)"
        required: false
        default: ""

permissions:
  contents: read

jobs:
  sign:
    runs-on: [self-hosted, linux, certum-signer]
    # Same protected environment as the release's sign job — approving the run
    # is part of the smoke test (it exercises the approval gate too).
    environment: release-signing
    env:
      SOCK: ${{ inputs.socket || vars.CERTUM_P11_SOCKET || '/run/p11-kit/p11kit.sock' }}
    steps:
      - name: Fetch a test binary (previous release's installer)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          rm -rf smoke && mkdir smoke
          gh release download "${{ inputs.release_tag }}" \
            --repo "$GITHUB_REPOSITORY" --pattern '*-setup.exe' --output smoke/test.exe
          ls -l smoke/test.exe

      - name: Socket present
        shell: bash
        run: |
          [ -S "$SOCK" ] || {
            echo "::error::p11-kit socket missing at $SOCK — is certum-container running and SimplySign logged in (VNC → login → close)?"
            exit 1
          }
          export P11_KIT_SERVER_ADDRESS="unix:path=$SOCK"
          # Informational: p11tool may not show the remote token from inside a
          # job (client module registration); the signer script loads the module
          # explicitly, so an empty listing here is not an error.
          p11tool --list-tokens || true

      - name: Sign (same signer script as release.yml)
        shell: bash
        run: |
          set -euo pipefail
          export P11_KIT_SERVER_ADDRESS="unix:path=$SOCK"
          # The runner's sign-installer.sh signs + timestamps (time.certum.pl)
          # + embeds the Certum intermediate for a self-contained chain. No PIN:
          # the SimplySign virtual card takes an empty PIN — the phone login IS
          # the auth.
          sign-installer.sh smoke/test.exe smoke/test-signed.exe \
            "DTH Character Studio" "https://github.com/polynaut/dth-character-studio"
          test -s smoke/test-signed.exe

      - name: Verify signature (informational)
        shell: bash
        run: |
          # Offline chain-anchoring on Certum's cross-signed roots is fussy —
          # a verification quirk here must not fail the probe; the produced
          # file having a signature is the pass criterion (checked above).
          osslsigncode verify -CAfile /etc/ssl/certs/ca-certificates.crt \
            -TSA-CAfile /etc/ssl/certs/ca-certificates.crt \
            -in smoke/test-signed.exe || true

      - name: Cleanup
        if: ${{ always() }}
        shell: bash
        run: rm -rf smoke
