name: 🔖 Version

# Maintains a "version packages" PR. When feature PRs that contain changesets
# land on main, this opens/updates a PR that bumps versions + writes CHANGELOGs.
# Merging that PR is what triggers a release (see release.yml).

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

concurrency: version-${{ github.ref }}

jobs:
  version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
      # pnpm version comes from package.json "packageManager" (no `version:` here,
      # or action-setup errors on the duplicate).
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1
        id: changesets
        with:
          version: pnpm version-packages
          title: '🚀 chore: version packages'
          commit: 'chore: version packages'
        env:
          # Prefer a PAT / GitHub App token (secret CHANGESETS_TOKEN) over the
          # default GITHUB_TOKEN. GitHub deliberately does NOT re-trigger
          # `on: pull_request` workflows for PRs opened by GITHUB_TOKEN, so the
          # version PR gets no CI runs and (with required checks on main) can't
          # be merged without manually closing/reopening it. A PAT-authored PR
          # fires the checks normally — no babysitting. Falls back to
          # GITHUB_TOKEN when the secret is absent (old behaviour). See docs/devops.md.
          GITHUB_TOKEN: ${{ secrets.CHANGESETS_TOKEN || secrets.GITHUB_TOKEN }}

      # The action writes an npm-centric boilerplate intro ("…publish to npm
      # yourself or setup this action to publish automatically…") that is wrong
      # for this repo — everything IS automated. Replace the intro with what
      # merging actually does, keep the generated "# Releases" section.
      - name: De-boilerplate the version PR description
        if: steps.changesets.outputs.pullRequestNumber
        env:
          GH_TOKEN: ${{ secrets.CHANGESETS_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          num='${{ steps.changesets.outputs.pullRequestNumber }}'
          body=$(gh pr view "$num" --repo "$GITHUB_REPOSITORY" --json body -q .body)
          case "$body" in
            *'# Releases'*) ;;
            *) echo "no '# Releases' section — leaving the body untouched"; exit 0 ;;
          esac
          rest="${body#*'# Releases'}"
          printf '%s\n\n# Releases%s' \
            '🚀 **The release train.** Kept up to date automatically — every merge to `main` that carries changesets refreshes this PR. **Merging it ships the release**: build → `sign-win` + `sign-mac` in parallel (each pauses for its own manual approval on the *release-signing* gate; `sign-mac` only when the mac release is enabled) → publish. Nothing is released by hand.' \
            "$rest" | gh pr edit "$num" --repo "$GITHUB_REPOSITORY" --body-file -
