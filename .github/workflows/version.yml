name: Version

# Maintains a "version packages" PR. When feature PRs that contain changesets
# land on main, this opens/updates a PR that bumps versions + writes CHANGELOGs.
# Merging that PR is what triggers a release (see release.yml).

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

concurrency: version-${{ github.ref }}

jobs:
  version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: changesets/action@v1
        with:
          version: pnpm version-packages
          title: 'chore: version packages'
          commit: 'chore: version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
