name: Version

# Maintains a "version packages" PR. When feature PRs that contain changesets
# land on main, this opens/updates a PR that bumps versions + writes CHANGELOGs.
# Merging that PR is what triggers a release (see release.yml).

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

concurrency: version-${{ github.ref }}

jobs:
  version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
      # pnpm version comes from package.json "packageManager" (no `version:` here,
      # or action-setup errors on the duplicate).
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1
        with:
          version: pnpm version-packages
          title: 'chore: version packages'
          commit: 'chore: version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
