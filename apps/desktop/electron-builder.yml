# Packaging config (groundwork). The dev + run-from-source flows work today;
# producing a distributable installer additionally requires bundling the web
# server's runtime dependencies (react-dom/server, @tanstack/*, srvx) into
# resources/web — pnpm's symlinked node_modules don't copy as-is. Planned as a
# follow-up (likely an esbuild bundle of apps/web/server/index.js). Until then
# `electron-builder` will package the shell but the embedded server may fail to
# resolve its deps at runtime.
appId: com.polynaut.dthcharacterstudio
productName: DTH Character Studio
directories:
  output: release
  buildResources: build
files:
  - out/**/*
  - package.json
extraResources:
  - from: ../web/dist
    to: web/dist
  - from: ../web/server
    to: web/server
  - from: ../web/package.json
    to: web/package.json
  # TODO: ship the web server's resolved runtime dependencies here too.
win:
  target: nsis
mac:
  target: dmg
  category: public.app-category.graphics-design
linux:
  target: AppImage
  category: Graphics
