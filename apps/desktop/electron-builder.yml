# Packaging config. The web server is shipped as a single self-contained esbuild
# bundle (apps/web/dist/standalone/server.mjs, produced by `bundle:server`) plus
# the static client assets — so no node_modules need to be copied into resources.
# The bundle expects dist/client to sit at ../client relative to itself, which is
# why both are placed under resources/web/dist (layout preserved from the source
# tree). Build prerequisites: `pnpm run build:desktop` (web build + bundle:server
# + desktop build) before `electron-builder`.
appId: com.polynaut.dthcharacterstudio
productName: DTH Character Studio
directories:
  output: release
  buildResources: build
files:
  - out/**/*
  - package.json
extraResources:
  - from: ../web/dist/standalone
    to: web/dist/standalone
  - from: ../web/dist/client
    to: web/dist/client
win:
  target: nsis
mac:
  target: dmg
  category: public.app-category.graphics-design
linux:
  target: AppImage
  category: Graphics
